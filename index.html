<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Symplyi•nii Lyrical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="mini-container">
      <!-- Top Bar -->
      <div
        class="p-6 flex justify-between items-center border-b border-white/5"
      >
        <div class="flex flex-col">
          <span
            class="text-xs font-semibold text-white/40 uppercase tracking-widest"
            >Now Playing</span
          >
          <span class="text-sm font-bold text-white">Symplyi•nii Lyrical</span>
        </div>
        <div class="flex flex-col">

          <button
            onclick="togglebackgroundgradient()"
            class="p-3 flex justify-between rounded-full hover:bg-white/10 transition"
          >
            <svg
              class="w-5 h-5 text-white/60"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 30 30"
              xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 5C8.925 5 4 9.925 4 16C4 22.075 8.925 27 15 27C17.5 27 18.5 25.5 20 25.5C21.5 25.5 23.5 27 26 27C26 21 27 13 15 5Z"
              />
              <circle cx="10" cy="13" r="1" fill="currentColor" />
              <circle cx="13" cy="10" r="1" fill="currentColor" />
              <circle cx="18" cy="11" r="1" fill="currentColor" />
              <circle cx="9" cy="18" r="1" fill="currentColor" />
              <circle cx="21" cy="20" r="2.5" stroke-width="2" />
            </svg>
          </button>

          <button
            onclick="toggleStudio()"
            class="p-3 flex justify-between rounded-full hover:bg-white/10 transition"
          >
            <svg
              class="w-5 h-5 text-white/60"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 30 30"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"
              />
            </svg>
          </button>
        </div>
      </div>

      <!-- Lyrics Area -->
      <div id="lyrics-viewport" class="lyrics-viewport">
        <!-- Lyrics go here -->
      </div>

      <!-- Controls Area -->
      <div class="p-6 bg-white/5 rounded-b-24px">
        <div class="mb-6">
          <div class="progress-bar-bg mb-2">
            <div id="progress-fill" class="progress-bar-fill"></div>
          </div>
          <div
            class="flex justify-between text-[10px] font-bold text-white/40 uppercase tracking-tighter"
          >
            <span id="time-current">0:00</span>
            <span id="time-total">0:00</span>
          </div>
        </div>

        <div class="flex items-center justify-between px-4">
          <button
            onclick="changeLine(-1)"
            class="text-white/40 hover:text-white transition"
          >
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
              <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
            </svg>
          </button>
          <button
            onclick="togglePlayback()"
            id="play-btn"
            class="w-14 h-14 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 transition shadow-lg shadow-white/10"
          >
            <svg
              id="play-icon"
              class="w-6 h-6 ml-1"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path d="M8 5v14l11-7z" />
            </svg>
          </button>
          <button
            onclick="changeLine(1)"
            class="text-white/40 hover:text-white transition"
          >
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
              <path d="M16 18h2V6h-2M6 18l8.5-6L6 6z" />
            </svg>
          </button>
        </div>
      </div>


      <!-- Studio Mode Overlay -->
      <div id="studio-overlay" class="studio-overlay">
        <h3 class="text-xl font-bold text-white mb-6">Edit Lyrics</h3>
        <textarea id="lyric-input"
          class="flex-1 bg-white/5 border border-white/10 rounded-xl p-4 text-white text-sm focus:outline-none focus:border-white/30 resize-none font-mono"
          placeholder="Paste lyrics here..."></textarea>
        <div class="flex gap-2">
          <button onclick="toggleStudio()"
            class="flex-1 py-3 rounded-xl bg-red-600 text-black text-sm font-bold hover:bg-gray-200 transition">
            Cancel
          </button>
          <button onclick="saveLyrics()"
            class="flex-1 py-3 rounded-xl bg-blue-600 text-black text-sm font-bold hover:bg-gray-200 transition">
            Save Changes
          </button>
        </div>
      
<div class="rounded-lg shadow-sm flex items-center justify-center ">
            <p class="text-slate-600 font-medium text-sm">
                Made with <span class="text-red-500">♥</span> by <a href="https://www.tiktok.com/@symplyi.nii" class="hover:text-indigo-600 transition-colors decoration underline text-white">Symplyi•nii</a>
            </p>
        </div>
      </div>

    <!-- Background Gradient Tool -->
    <div id="backdrop" class="overlay-backdrop" onclick="togglebackgroundgradient()"></div>

    <!-- THE STUDIO MODAL -->
    <div id="gradient-overlay" class="gradient-overlay bg-zinc-900 p-8 rounded-3xl border border-white/10 w-full max-w-md">
        <h3 class="text-xl font-bold text-white mb-6">Edit Background Gradient</h3>

        <div class="flex flex-col gap-4 flex-1">
            <div id="gradient-preview" class="w-full h-24 rounded-xl border border-white/20 mb-2" style="background: linear-gradient(135deg, #6366f1, #a855f7)"></div>

            <div class="grid grid-cols-2 gap-3">
                <div class="flex flex-col gap-2">
                    <div class="flex justify-between items-center">
                        <label class="text-xs text-white/50 uppercase font-bold">Start Color</label>
                        <span id="hex-start" class="text-[10px] text-white/40 font-mono">#6366F1</span>
                    </div>
                    <div class="relative">
                        <input type="color" id="color-start" value="#6366f1" oninput="updateGradientPreview()" class="w-full h-12 bg-white/5 border border-white/10 rounded-xl cursor-pointer p-1" />
                        <div id="swatch-start" class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 rounded-full border border-white/20 pointer-events-none" style="background: #6366f1"></div>
                    </div>
                </div>
                <div class="flex flex-col gap-2">
                    <div class="flex justify-between items-center">
                        <label class="text-xs text-white/50 uppercase font-bold">End Color</label>
                        <span id="hex-end" class="text-[10px] text-white/40 font-mono">#A855F7</span>
                    </div>
                    <div class="relative">
                        <input type="color" id="color-end" value="#a855f7" oninput="updateGradientPreview()" class="w-full h-12 bg-white/5 border border-white/10 rounded-xl cursor-pointer p-1" />
                        <div id="swatch-end" class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 rounded-full border border-white/20 pointer-events-none" style="background: #a855f7"></div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <div class="flex justify-between">
                    <label class="text-xs text-white/50 uppercase font-bold">Text Pace</label>
                    <span id="span-value" class="text-xs text-white font-mono">3</span>
                </div>
                <input type="range" id="pacing-angle" min="1" max="10" value="3" class="w-full accent-white" oninput="updateGradientPreview()" />
            </div>

            <div class="flex flex-col gap-2">
                <div class="flex justify-between">
                    <label class="text-xs text-white/50 uppercase font-bold">Angle</label>
                    <span id="angle-value" class="text-xs text-white font-mono">135°</span>
                </div>
                <input type="range" id="gradient-angle" min="0" max="360" value="135" class="w-full accent-white" oninput="updateGradientPreview()" />
            </div>
        </div>

        <div class="flex gap-2 pt-6">
            <button onclick="togglebackgroundgradient()" class="flex-1 py-3 rounded-xl bg-white/5 text-white text-sm font-bold hover:bg-white/10 transition">
                Cancel
            </button>
            <button onclick="saveGradient()" class="flex-1 py-3 rounded-xl bg-white text-black text-sm font-bold hover:bg-gray-200 transition">
                Apply Background
            </button>
        </div>
    </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
